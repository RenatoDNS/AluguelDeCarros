openapi: 3.0.3
info:
  title: Aluguel de Carros API
  description: |
    API REST do serviço de aluguel de carros (Micronaut).

    **Autenticação:** a maioria das rotas exige header `Authorization: Bearer <JWT>`.
    Rotas públicas (sem token): `POST /auth/login` e `POST /clientes` (cadastro).
  version: 0.1.0

servers:
  - url: http://localhost:8080/api/aluguelcarros/v1
    description: Local (porta e context-path de `application.yml`)

tags:
  - name: Autenticação
    description: Login e logout com JWT
  - name: Clientes
    description: Cadastro e gestão de clientes

paths:
  /auth/login:
    post:
      tags: [Autenticação]
      summary: Autenticar e obter token JWT
      description: |
        O campo `login` aceita CPF ou identificador de login cadastrado no sistema.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Autenticação bem-sucedida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
              example:
                mensagem: Credenciais inválidas.

  /auth/logout:
    post:
      tags: [Autenticação]
      summary: Encerrar sessão (valida o token)
      description: |
        Valida o JWT e responde sem corpo. Requer `Authorization: Bearer <token>`.
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Token válido; logout processado (sem corpo)
        '401':
          description: Token ausente, inválido ou formato incorreto

  /clientes:
    post:
      tags: [Clientes]
      summary: Cadastrar cliente
      description: Rota pública — não exige JWT.
      operationId: cadastrarCliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteRequest'
      responses:
        '200':
          description: Cliente criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteResponse'
        '400':
          description: Erro de validação (ex. campos obrigatórios ou tamanho da lista de empregadores)
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /clientes/{id}:
    parameters:
      - $ref: '#/components/parameters/ClienteId'
    get:
      tags: [Clientes]
      summary: Buscar cliente por id
      operationId: buscarClientePorId
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cliente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteResponse'
        '401':
          description: Não autorizado
        '404':
          description: Cliente não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
    put:
      tags: [Clientes]
      summary: Atualizar cliente
      operationId: atualizarCliente
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteRequest'
      responses:
        '200':
          description: Cliente atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteResponse'
        '400':
          description: Erro de validação
        '401':
          description: Não autorizado
        '404':
          description: Cliente não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
    delete:
      tags: [Clientes]
      summary: Remover cliente
      operationId: removerCliente
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Cliente removido (sem corpo)
        '401':
          description: Não autorizado
        '404':
          description: Cliente não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token retornado por `POST /auth/login`

  parameters:
    ClienteId:
      name: id
      in: path
      required: true
      description: Identificador do cliente
      schema:
        type: integer
        format: int64

  schemas:
    LoginRequest:
      type: object
      required: [login, senha]
      properties:
        login:
          type: string
          description: CPF ou login cadastrado
        senha:
          type: string
          format: password

    TokenResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT
        expiresIn:
          type: integer
          format: int64
          description: Tempo de expiração do token em milissegundos (configuração `jwt.expiration-ms`)

    EntidadeEmpregadora:
      type: object
      required: [nomeEmpresa, cnpj, rendimento]
      properties:
        nomeEmpresa:
          type: string
        cnpj:
          type: string
        rendimento:
          type: number
          format: double

    ClienteRequest:
      type: object
      required:
        - rg
        - cpf
        - nome
        - endereco
        - profissao
        - senha
        - entidadesEmpregadoras
      properties:
        rg:
          type: string
        cpf:
          type: string
        nome:
          type: string
        endereco:
          type: string
        profissao:
          type: string
        senha:
          type: string
          format: password
        entidadesEmpregadoras:
          type: array
          minItems: 1
          maxItems: 3
          items:
            $ref: '#/components/schemas/EntidadeEmpregadora'

    ClienteResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nome:
          type: string
        cpf:
          type: string

    MensagemErro:
      type: object
      properties:
        mensagem:
          type: string
      description: Formato usado pelo tratamento global de `EntidadeNaoEncontradaException` e `RegraDeNegocioException`, e no login inválido
