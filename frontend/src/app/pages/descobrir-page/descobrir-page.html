<section class="space-y-6">
  <div class="rounded-[1.75rem] border border-white/70 bg-white/90 p-6 sm:p-8">
    <p class="text-sm font-semibold uppercase tracking-[0.28em] text-primary-600">Descobrir</p>
    <h1 class="mt-3 font-display text-3xl font-semibold text-slate-950">Veículos disponíveis</h1>
    <p class="mt-4 max-w-2xl text-sm leading-7 text-slate-600">
      Explore a frota cadastrada no sistema e consulte os principais dados de cada veículo.
    </p>
  </div>

  <div class="grid gap-5 sm:grid-cols-2 xl:grid-cols-3">
    @for (veiculo of veiculos(); track veiculo.matricula) {
      <app-veiculo-card [veiculo]="veiculo" />
    }
  </div>
</section>
