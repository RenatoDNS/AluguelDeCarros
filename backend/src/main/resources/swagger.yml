openapi: 3.0.3
info:
  title: Aluguel de Carros API
  description: |
    API REST do serviço de aluguel de carros (Micronaut).

    **Autenticação:** a maioria das rotas exige header `Authorization: Bearer <JWT>`.

    **Rotas públicas (sem token):**
    - `POST /auth/login`
    - `POST /clientes`
    - `POST /bancos`
    - `POST /empresas`
    - `GET /swagger-ui`
    - `GET /swagger-ui/swagger.yml`
  version: 0.1.0

servers:
  - url: http://localhost:8080/api/aluguelcarros/v1
    description: Ambiente local

tags:
  - name: Autenticação
    description: Login JWT e leitura de perfil autenticado
  - name: Clientes
    description: Cadastro de clientes
  - name: Bancos
    description: Cadastro de bancos
  - name: Empresas
    description: Cadastro de empresas
  - name: Automóveis
    description: Cadastro e Gestão de automóveis
  - name: Pedidos
    description: Fluxos de pedidos
  - name: Pareceres
    description: Emissão e Gestão de pareceres
  - name: Contratos
    description: Gestão de contratos
  - name: Contratos de Crédito
    description: Gestão de contratos de crédito
  - name: Swagger
    description: Endpoints da documentação OpenAPI e UI
  - name: Fluxos de Negócio
    description: Endpoints de fluxo por perfil

paths:
  /swagger-ui:
    get:
      tags: [Swagger]
      summary: Redirecionar para a interface Swagger UI
      operationId: swaggerUiIndex
      responses:
        '307':
          description: Redireciona para `/swagger-ui/index.html`

  /swagger-ui/swagger.yml:
    get:
      tags: [Swagger]
      summary: Obter especificação OpenAPI em YAML
      operationId: swaggerSpec
      responses:
        '200':
          description: Especificação YAML
          content:
            application/yaml:
              schema:
                type: string
        '404':
          description: Arquivo de especificação não encontrado

  /auth/login:
    post:
      tags: [Autenticação]
      summary: Autenticar e obter token JWT
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              login: '12345678901'
              senha: 'senha123'
      responses:
        '200':
          description: Autenticação bem-sucedida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /auth/me:
    get:
      tags: [Autenticação]
      summary: Retornar o perfil autenticado
      operationId: me
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          description: Token ausente, inválido ou formato incorreto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /clientes:
    post:
      tags: [Clientes]
      summary: Cadastrar cliente
      operationId: cadastrarCliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteRequest'
      responses:
        '200':
          description: Cliente criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteResponse'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /bancos:
    post:
      tags: [Bancos]
      summary: Cadastrar banco
      operationId: cadastrarBanco
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BancoRequest'
      responses:
        '200':
          description: Banco criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BancoResponse'
        '400':
          description: Erro de validação
          content:
            application/json:
