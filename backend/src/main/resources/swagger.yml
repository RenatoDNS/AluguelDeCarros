openapi: 3.0.3
info:
  title: Aluguel de Carros API
  description: |
    API REST do serviço de aluguel de carros (Micronaut).

    **Autenticação:** a maioria das rotas exige header `Authorization: Bearer <JWT>`.

    **Rotas públicas (sem token):**
    - `POST /auth/login`
    - `POST /clientes`
    - `POST /bancos`
    - `POST /empresas`
    - `GET /swagger-ui`
    - `GET /swagger-ui/swagger.yml`
  version: 0.1.0

servers:
  - url: http://localhost:8080/api/aluguelcarros/v1
    description: Ambiente local

tags:
  - name: Autenticação
    description: Login JWT e leitura de perfil autenticado
  - name: Clientes
    description: Cadastro de clientes
  - name: Bancos
    description: Cadastro de bancos
  - name: Empresas
    description: Cadastro de empresas
  - name: Automóveis
    description: Cadastro e gestão de automóveis
  - name: Pedidos
    description: Criação de pedidos de aluguel e compra a crédito
  - name: Contratos
    description: Consulta e assinatura de contratos de aluguel
  - name: Contratos de Crédito
    description: Consulta e assinatura de contratos de compra a crédito
  - name: Fluxos de Negócio
    description: Ações por perfil — listagem e avaliação de pedidos pelo agente, cancelamento pelo cliente
  - name: Swagger
    description: Endpoints da documentação OpenAPI e UI

paths:
  /swagger-ui:
    get:
      tags: [Swagger]
      summary: Redirecionar para a interface Swagger UI
      operationId: swaggerUiIndex
      responses:
        '307':
          description: Redireciona para `/swagger-ui/index.html`

  /swagger-ui/swagger.yml:
    get:
      tags: [Swagger]
      summary: Obter especificação OpenAPI em YAML
      operationId: swaggerSpec
      responses:
        '200':
          description: Especificação YAML
          content:
            application/yaml:
              schema:
                type: string
        '404':
          description: Arquivo de especificação não encontrado

  /auth/login:
    post:
      tags: [Autenticação]
      summary: Autenticar e obter token JWT
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              login: '12345678901'
              senha: 'senha123'
      responses:
        '200':
          description: Autenticação bem-sucedida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /auth/me:
    get:
      tags: [Autenticação]
      summary: Retornar o perfil autenticado
      operationId: me
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          description: Token ausente, inválido ou formato incorreto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /clientes:
    post:
      tags: [Clientes]
      summary: Cadastrar cliente
      operationId: cadastrarCliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteRequest'
      responses:
        '200':
          description: Cliente criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteResponse'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /bancos:
    post:
      tags: [Bancos]
      summary: Cadastrar banco
      operationId: cadastrarBanco
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BancoRequest'
      responses:
        '200':
          description: Banco criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BancoResponse'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /empresas:
    post:
      tags: [Empresas]
      summary: Cadastrar empresa
      operationId: cadastrarEmpresa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpresaRequest'
      responses:
        '200':
          description: Empresa criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpresaResponse'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /automoveis:
    post:
      tags: [Automóveis]
      summary: Cadastrar automóvel
      description: Disponível apenas para perfis `empresa` e `banco`.
      operationId: cadastrarAutomovel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomovelRequest'
      responses:
        '200':
          description: Automóvel criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomovelResponse'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '401':
          description: Não autorizado
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
    get:
      tags: [Automóveis]
      summary: Listar todos os automóveis
      operationId: listarAutomoveis
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de automóveis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AutomovelResponse'
        '401':
          description: Não autorizado

  /automoveis/me:
    get:
      tags: [Automóveis]
      summary: Listar automóveis do agente autenticado
      operationId: listarMeusAutomoveis
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de automóveis do agente autenticado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AutomovelResponse'
        '401':
          description: Não autorizado
        '422':
          description: Perfil sem permissão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /automoveis/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Automóveis]
      summary: Buscar automóvel por id
      operationId: buscarAutomovelPorId
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Automóvel encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomovelResponse'
        '401':
          description: Não autorizado
        '404':
          description: Automóvel não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
    put:
      tags: [Automóveis]
      summary: Atualizar automóvel
      operationId: atualizarAutomovel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomovelRequest'
      responses:
        '200':
          description: Automóvel atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomovelResponse'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '401':
          description: Não autorizado
        '404':
          description: Automóvel não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
    delete:
      tags: [Automóveis]
      summary: Remover automóvel
      operationId: removerAutomovel
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Automóvel removido
        '401':
          description: Não autorizado
        '404':
          description: Automóvel não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /automoveis/status/{status}:
    parameters:
      - $ref: '#/components/parameters/StatusPath'
    get:
      tags: [Automóveis]
      summary: Listar automóveis por status
      operationId: listarAutomoveisPorStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de automóveis filtrada por status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AutomovelResponse'
        '401':
          description: Não autorizado
        '422':
          description: Status inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /pedidos/aluguel:
    post:
      tags: [Pedidos]
      summary: Cadastrar pedido de aluguel
      operationId: cadastrarPedidoAluguel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PedidoAluguelRequest'
      responses:
        '200':
          description: Pedido de aluguel criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoResponse'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '401':
          description: Não autorizado
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /pedidos/credito:
    post:
      tags: [Pedidos]
      summary: Cadastrar pedido de compra a crédito
      operationId: cadastrarPedidoCompra
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PedidoCompraRequest'
      responses:
        '200':
          description: Pedido de compra criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoResponse'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '401':
          description: Não autorizado
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /pedidos/me:
    get:
      tags: [Fluxos de Negócio]
      summary: Listar pedidos do cliente autenticado
      operationId: listarPedidosMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de pedidos do cliente autenticado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PedidoResponse'
        '401':
          description: Não autorizado
        '422':
          description: Perfil sem permissão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /pedidos/{id}/cancelar:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Fluxos de Negócio]
      summary: Cancelar pedido
      operationId: cancelarPedido
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pedido cancelado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoResponse'
        '401':
          description: Não autorizado
        '404':
          description: Pedido não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /agente/pedidos/{status}:
    parameters:
      - $ref: '#/components/parameters/StatusPath'
    get:
      tags: [Fluxos de Negócio]
      summary: Listar pedidos por status para agente
      description: |
        Lista pedidos vinculados aos automóveis do agente autenticado (`empresa` ou `banco`),
        filtrados pelo `status` informado. Quando `status` for `APROVADO`, o contrato
        correspondente é gerado automaticamente se ainda não existir.
      operationId: listarPedidosPorStatusParaAgente
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de pedidos por status vinculados ao agente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PedidoResponse'
        '401':
          description: Não autorizado
        '422':
          description: Perfil sem permissão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /agente/pedidos/{id}/avaliar:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Fluxos de Negócio]
      summary: Avaliar pedido como agente
      operationId: avaliarPedidoComoAgente
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PedidoAvaliacaoRequest'
      responses:
        '200':
          description: Pedido avaliado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoResponse'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '401':
          description: Não autorizado
        '404':
          description: Pedido não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /contratos/{pedidoId}:
    parameters:
      - name: pedidoId
        in: path
        required: true
        description: ID do pedido de aluguel vinculado ao contrato
        schema:
          type: integer
          format: int64
    get:
      tags: [Contratos]
      summary: Buscar contrato pelo id do pedido
      description: Retorna o contrato de aluguel gerado automaticamente quando o pedido foi aprovado.
      operationId: buscarContratoPorPedidoId
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Contrato encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContratoResponse'
        '401':
          description: Não autorizado
        '404':
          description: Contrato não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /contratos/{id}/assinar:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Contratos]
      summary: Assinar contrato
      description: |
        Registra a assinatura do usuário autenticado no contrato. Cada parte
        (empresa e cliente) precisa assinar separadamente. O contrato é
        considerado executado quando ambos assinam.
      operationId: assinarContrato
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Contrato assinado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContratoResponse'
        '401':
          description: Não autorizado
        '404':
          description: Contrato não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '422':
          description: Regra de negócio violada (ex.: usuário sem permissão ou já assinou)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /contratos-credito/{pedidoId}:
    parameters:
      - name: pedidoId
        in: path
        required: true
        description: ID do pedido de compra a crédito vinculado ao contrato
        schema:
          type: integer
          format: int64
    get:
      tags: [Contratos de Crédito]
      summary: Buscar contrato de crédito pelo id do pedido
      description: Retorna o contrato de crédito gerado automaticamente quando o pedido foi aprovado.
      operationId: buscarContratoCreditoPorPedidoId
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Contrato de crédito encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContratoCreditoResponse'
        '401':
          description: Não autorizado
        '404':
          description: Contrato de crédito não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

  /contratos-credito/{id}/assinar:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Contratos de Crédito]
      summary: Assinar contrato de crédito
      description: |
        Registra a assinatura do usuário autenticado no contrato de crédito. Banco
        e cliente assinam separadamente. O contrato é considerado executado quando
        ambos assinam.
      operationId: assinarContratoCredito
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Contrato de crédito assinado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContratoCreditoResponse'
        '401':
          description: Não autorizado
        '404':
          description: Contrato de crédito não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '422':
          description: Regra de negócio violada (ex.: usuário sem permissão ou já assinou)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token retornado em `POST /auth/login`

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

    StatusPath:
      name: status
      in: path
      required: true
      schema:
        type: string

  schemas:
    LoginRequest:
      type: object
      required: [login, senha]
      properties:
        login:
          type: string
          description: CPF (cliente) ou CNPJ (empresa/banco)
        senha:
          type: string
          format: password

    TokenResponse:
      type: object
      required: [token, expiresIn, userType]
      properties:
        token:
          type: string
        expiresIn:
          type: integer
          format: int64
          description: Tempo de expiração do token em milissegundos
        userType:
          $ref: '#/components/schemas/UserType'

    AuthMeResponse:
      type: object
      required: [id, login, userType]
      properties:
        id:
          type: integer
          format: int64
        login:
          type: string
        userType:
          $ref: '#/components/schemas/UserType'

    UserType:
      type: string
      enum: [cliente, empresa, banco]

    EntidadeEmpregadoraRequest:
      type: object
      required: [nomeEmpresa, cnpj, rendimento]
      properties:
        nomeEmpresa:
          type: string
        cnpj:
          type: string
        rendimento:
          type: number
          format: double

    EntidadeEmpregadoraResponse:
      type: object
      properties:
        nomeEmpresa:
          type: string
        cnpj:
          type: string
        rendimento:
          type: number
          format: double

    ClienteRequest:
      type: object
      required: [rg, cpf, nome, endereco, profissao, senha, entidadesEmpregadoras]
      properties:
        rg:
          type: string
        cpf:
          type: string
        nome:
          type: string
        endereco:
          type: string
        profissao:
          type: string
        senha:
          type: string
          format: password
        entidadesEmpregadoras:
          type: array
          minItems: 1
          maxItems: 3
          items:
            $ref: '#/components/schemas/EntidadeEmpregadoraRequest'

    ClienteResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        rg:
          type: string
        nome:
          type: string
        cpf:
          type: string
        endereco:
          type: string
        profissao:
          type: string
        entidadesEmpregadoras:
          type: array
          items:
            $ref: '#/components/schemas/EntidadeEmpregadoraResponse'

    BancoRequest:
      type: object
      required: [razaoSocial, cnpj, codigoBancario, senha]
      properties:
        razaoSocial:
          type: string
        cnpj:
          type: string
        codigoBancario:
          type: string
        senha:
          type: string
          format: password

    BancoResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        razaoSocial:
          type: string
        cnpj:
          type: string
        codigoBancario:
          type: string

    EmpresaRequest:
      type: object
      required: [razaoSocial, cnpj, ramoDeAtividade, senha]
      properties:
        razaoSocial:
          type: string
        cnpj:
          type: string
        ramoDeAtividade:
          type: string
        senha:
          type: string
          format: password

    EmpresaResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        razaoSocial:
          type: string
        cnpj:
          type: string
        ramoDeAtividade:
          type: string

    AgenteTipo:
      type: string
      enum: [BANCO, EMPRESA]

    AutomovelStatus:
      type: string
      enum: [DISPONIVEL, ALUGADO, VINCULADO]

    AutomovelRequest:
      type: object
      required: [matricula, placa, ano, marca, modelo, valor, linkImagem, status]
      properties:
        matricula:
          type: string
        placa:
          type: string
        ano:
          type: integer
          format: int32
        marca:
          type: string
        modelo:
          type: string
        valor:
          type: number
          format: double
          minimum: 0.01
        linkImagem:
          type: string
          maxLength: 2048
        taxaJuros:
          type: number
          format: double
          minimum: 0.0001
          nullable: true
        status:
          $ref: '#/components/schemas/AutomovelStatus'

    AutomovelResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        matricula:
          type: string
        placa:
          type: string
        ano:
          type: integer
          format: int32
        marca:
          type: string
        modelo:
          type: string
        valor:
          type: number
          format: double
