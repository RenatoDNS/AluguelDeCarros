          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContratoCreditoResponse'
        '401':
          description: Não autorizado

  /contratos-cr/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Contratos de Cr]
      summary: Buscar contrato de crédito por id
      operationId: buscarContratoCreditoPorId
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Contrato de crédito encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContratoCreditoResponse'
        '401':
          description: Não autorizado
        '404':
          description: Contrato de crédito não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
    put:
      tags: [Contratos de Cr]
      summary: Atualizar contrato de crédito
      operationId: atualizarContratoCredito
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContratoCreditoRequest'
      responses:
        '200':
          description: Contrato de crédito atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContratoCreditoResponse'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '401':
          description: Não autorizado
        '404':
          description: Contrato de crédito não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
        '422':
          description: Regra de negócio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'
    delete:
      tags: [Contratos de Cr]
      summary: Remover contrato de crédito
      operationId: removerContratoCredito
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Contrato de crédito removido
        '401':
          description: Não autorizado
        '404':
          description: Contrato de crédito não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensagemErro'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token retornado em `POST /auth/login`

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

    StatusPath:
      name: status
      in: path
      required: true
      schema:
        type: string

  schemas:
    LoginRequest:
      type: object
      required: [login, senha]
      properties:
        login:
          type: string
          description: CPF (cliente) ou CNPJ (empresa/banco)
        senha:
          type: string
          format: password

    TokenResponse:
      type: object
      required: [token, expiresIn, userType]
      properties:
        token:
          type: string
        expiresIn:
          type: integer
          format: int64
          description: Tempo de expiracao do token em milissegundos
        userType:
          $ref: '#/components/schemas/UserType'

    AuthMeResponse:
      type: object
      required: [id, login, userType]
      properties:
        id:
          type: integer
          format: int64
        login:
          type: string
        userType:
          $ref: '#/components/schemas/UserType'

    UserType:
      type: string
      enum: [cliente, empresa, banco]

    EntidadeEmpregadoraRequest:
      type: object
      required: [nomeEmpresa, cnpj, rendimento]
      properties:
        nomeEmpresa:
          type: string
        cnpj:
          type: string
        rendimento:
          type: number
          format: double

    EntidadeEmpregadoraResponse:
      type: object
      properties:
        nomeEmpresa:
          type: string
        cnpj:
          type: string
        rendimento:
          type: number
          format: double

    ClienteRequest:
      type: object
      required: [rg, cpf, nome, endereco, profissao, senha, entidadesEmpregadoras]
      properties:
        rg:
          type: string
        cpf:
          type: string
        nome:
          type: string
        endereco:
          type: string
        profissao:
          type: string
        senha:
          type: string
          format: password
        entidadesEmpregadoras:
          type: array
          minItems: 1
          maxItems: 3
          items:
            $ref: '#/components/schemas/EntidadeEmpregadoraRequest'

    ClienteResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        rg:
          type: string
        nome:
          type: string
        cpf:
          type: string
        endereco:
          type: string
        profissao:
          type: string
        entidadesEmpregadoras:
          type: array
          items:
            $ref: '#/components/schemas/EntidadeEmpregadoraResponse'

    BancoRequest:
      type: object
      required: [razaoSocial, cnpj, codigoBancario, senha]
      properties:
        razaoSocial:
          type: string
        cnpj:
          type: string
        codigoBancario:
          type: string
        senha:
          type: string
          format: password

    BancoResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        razaoSocial:
          type: string
        cnpj:
          type: string
        codigoBancario:
          type: string

    EmpresaRequest:
      type: object
      required: [razaoSocial, cnpj, ramoDeAtividade, senha]
      properties:
        razaoSocial:
          type: string
        cnpj:
          type: string
        ramoDeAtividade:
          type: string
        senha:
          type: string
          format: password

    EmpresaResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        razaoSocial:
          type: string
        cnpj:
          type: string
        ramoDeAtividade:
          type: string

    AgenteTipo:
      type: string
      enum: [BANCO, EMPRESA]

    AutomovelStatus:
      type: string
      enum: [DISPONIVEL, ALUGADO, VINCULADO]

    AutomovelRequest:
      type: object
      required: [matricula, placa, ano, marca, modelo, diaria, status]
      properties:
        matricula:
          type: string
        placa:
          type: string
        ano:
          type: integer
          format: int32
        marca:
          type: string
        modelo:
          type: string
        diaria:
          type: number
          format: double
          minimum: 0.01
        status:
          $ref: '#/components/schemas/AutomovelStatus'

    AutomovelResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        matricula:
          type: string
        placa:
          type: string
        ano:
          type: integer
          format: int32
        marca:
          type: string
        modelo:
          type: string
        diaria:
          type: number
          format: double
        agentId:
          type: integer
          format: int64
        agentType:
          $ref: '#/components/schemas/AgenteTipo'
        status:
          $ref: '#/components/schemas/AutomovelStatus'

    PedidoStatus:
      type: string
      enum: [EM_ANALISE, APROVADO, REJEITADO, CANCELADO]

    PedidoRequest:
      type: object
      required: [clienteId, automovelId, dataInicio, dataFim]
      properties:
        clienteId:
          type: integer
          format: int64
        automovelId:
          type: integer
          format: int64
        dataInicio:
          type: string
          format: date
        dataFim:
          type: string
          format: date
        status:
          type: string
          nullable: true

    PedidoResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        numeroProtocolo:
          type: string
        clienteId:
          type: integer
          format: int64
        automovelId:
          type: integer
          format: int64
        dataInicio:
          type: string
          format: date
        dataFim:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/PedidoStatus'

    ParecerResultado:
      type: string
      enum: [APROVADO, REJEITADO]

    PedidoAvaliacaoRequest:
      type: object
      required: [resultado, justificativa]
      properties:
        resultado:
          $ref: '#/components/schemas/ParecerResultado'
        justificativa:
          type: string

    ParecerRequest:
      type: object
      required: [pedidoId, agenteTipo, agenteId, resultado, justificativa, dataEmissão]
      properties:
        pedidoId:
          type: integer
          format: int64
        agenteTipo:
          $ref: '#/components/schemas/AgenteTipo'
        agenteId:
          type: integer
          format: int64
        resultado:
          $ref: '#/components/schemas/ParecerResultado'
        justificativa:
          type: string
        dataEmissão:
          type: string
          format: date

    ParecerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        pedidoId:
          type: integer
          format: int64
        agenteTipo:
          $ref: '#/components/schemas/AgenteTipo'
        agenteId:
          type: integer
          format: int64
        resultado:
          $ref: '#/components/schemas/ParecerResultado'
        justificativa:
          type: string
        dataEmissão:
          type: string
          format: date

    TipoPropriedade:
      type: string
      enum: [CLIENTE, EMPRESA, BANCO]

    ContratoRequest:
      type: object
      required: [pedidoId, tipoPropriedade, dataAssinatura]
      properties:
        pedidoId:
          type: integer
          format: int64
        tipoPropriedade:
          $ref: '#/components/schemas/TipoPropriedade'
        dataAssinatura:
          type: string
          format: date

    ContratoResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        pedidoId:
          type: integer
          format: int64
        automovelId:
          type: integer
          format: int64
        tipoPropriedade:
          $ref: '#/components/schemas/TipoPropriedade'
        dataAssinatura:
          type: string
          format: date

    ContratoCreditoRequest:
      type: object
      required: [contratoId, valorFinanciado, taxaJuros, prazoMeses]
      properties:
        contratoId:
          type: integer
          format: int64
        valorFinanciado:
          type: number
          format: double
          minimum: 0.01
        taxaJuros:
          type: number
          format: double
          minimum: 0.01
        prazoMeses:
          type: integer
          format: int32
          minimum: 1

    AssociarCreditoRequest:
      type: object
      required: [valorFinanciado, taxaJuros, prazoMeses]
      properties:
        valorFinanciado:
          type: number
          format: double
          minimum: 0.01
        taxaJuros:
          type: number
          format: double
          minimum: 0.01
        prazoMeses:
          type: integer
          format: int32
          minimum: 1
        dataAssinatura:
          type: string
          format: date
          nullable: true

    ContratoCreditoResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        contratoId:
          type: integer
          format: int64
        bancoId:
          type: integer
          format: int64
        valorFinanciado:
          type: number
          format: double
        taxaJuros:
          type: number
          format: double
        prazoMeses:
          type: integer
          format: int32

    MensagemErro:
      type: object
      properties:
        mensagem:
          type: string
