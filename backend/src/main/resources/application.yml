micronaut:
  application:
    name: aluguelcarros
  server:
    context-path: ${SERVER_CONTEXT_PATH}
    port: ${SERVER_PORT}
    cors:
      enabled: ${CORS_ENABLED}
      configurations:
        web:
          allowed-origins:
            - ${CORS_ALLOWED_ORIGIN}
          allowed-methods: [GET, POST, PUT, DELETE, OPTIONS]
          allowed-headers: [Authorization, Content-Type, Accept, Origin]
          allow-credentials: ${CORS_ALLOW_CREDENTIALS}
  router:
    static-resources:
      swagger-ui:
        paths:
          [
            classpath:swagger-ui,
            classpath:META-INF/resources/webjars/swagger-ui/5.17.14,
          ]
        mapping: /swagger-ui/**

datasources:
  default:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

jpa:
  default:
    entity-scan:
      packages: "br.pucminas.aluguelcarros.model"
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS}
