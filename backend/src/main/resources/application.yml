micronaut:
  application:
    name: aluguelcarros
  server:
    context-path: /api/aluguelcarros/v1
    port: 8080
    cors:
      enabled: true
      configurations:
        web:
          allowed-origins:
            - http://localhost:4200
          allowed-methods: [GET, POST, PUT, DELETE, OPTIONS]
          allowed-headers: [Authorization, Content-Type, Accept, Origin]
          allow-credentials: true
  router:
    static-resources:
      swagger-ui:
        paths:
          [
            classpath:swagger-ui,
            classpath:META-INF/resources/webjars/swagger-ui/5.17.14,
          ]
        mapping: /swagger-ui/**

datasources:
  default:
    url: ${DB_URL:`jdbc:postgresql://localhost:5432/aluguelcarros`}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

jpa:
  default:
    entity-scan:
      packages: "br.pucminas.aluguelcarros.model"
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  # TODO: mover para variável de ambiente
  secret: teste-secret-key-isso-ira-mudar
  expiration-ms: 3600000
  # 3600000 = 1 hora
