services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aluguelcarros-api
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/aluguelcarros
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: aluguelcarros-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aluguelcarros
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aluguelcarros"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
